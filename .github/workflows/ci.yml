name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby: ['3.4', '3.5', 'head', 'debug']
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - run: bundle install
      - run: rake compile
      - run: rake test

  manual:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - run: gem install ligarb
      - run: cd docs/manual_src && ligarb build
      - name: Check manual is up to date
        run: |
          if ! git diff --quiet docs/manual/; then
            echo "::error::docs/manual/ is out of date. Run 'rake manual' and commit the result."
            git diff --stat docs/manual/
            exit 1
          fi
